<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDTD Newsletter — Issue 01 / April 2026</title>
    <meta name="description" content="Meet GDTD — Republic Bank's Group Digital Technology Division. A high-level profile of the division's structure, leadership, milestones, and capabilities." />
    <link rel="icon" type="image/png" href="/logo.png" />
    <script>
      (function () {
        var img = new Image();
        img.onload = function () {
          var size = 64;
          var canvas = document.createElement("canvas");
          canvas.width = canvas.height = size;
          var ctx = canvas.getContext("2d");
          ctx.beginPath();
          ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, size, size);
          var link = document.querySelector("link[rel~='icon']");
          link.type = "image/png";
          link.href = canvas.toDataURL("image/png");
        };
        img.src = "/logo.png";
      })();
    </script>

    <!-- Open Graph (Teams, Slack, email, link previews) -->
    <meta property="og:type"        content="website" />
